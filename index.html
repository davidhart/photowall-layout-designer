<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photowall Layout Designer</title>
  </head>
  <body>
    <div id="app">
      <!-- Main wall view: zoomable / pannable SVG canvas -->
      <main id="wall-view" class="wall-view">
        <!-- SVG wall is injected here by the renderer -->
      </main>

      <!-- Left floating panel: Project / Frames tabs -->
      <aside id="left-panel" class="left-panel">
        <nav class="left-panel__tabs" role="tablist">
          <button type="button" role="tab" data-tab="project" aria-selected="true">Project</button>
          <button type="button" role="tab" data-tab="frames">Frames</button>
        </nav>
        <div class="left-panel__body">
          <section class="tab-panel" data-tab-panel="project"></section>
          <section class="tab-panel" data-tab-panel="frames" hidden></section>
        </div>
      </aside>

      <!-- Floating frame properties panel (shown on selection) -->
      <aside id="properties-panel" class="properties-panel" hidden></aside>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
